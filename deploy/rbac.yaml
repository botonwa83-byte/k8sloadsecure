apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8sgate-controller
  namespace: k8sgate-system
  labels:
    app: k8sgate

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k8sgate-controller
  labels:
    app: k8sgate
subjects:
  - kind: ServiceAccount
    name: k8sgate-controller
    namespace: k8sgate-system
roleRef:
  kind: ClusterRole
  name: cluster-admin
  apiGroup: rbac.authorization.k8s.io
