apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8sgate-backend
  namespace: k8sgate-system
  labels:
    app: k8sgate-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: k8sgate-backend
  template:
    metadata:
      labels:
        app: k8sgate-backend
    spec:
      serviceAccountName: k8sgate-controller
      containers:
        - name: backend
          image: registry.wanfangdata.com.cn/k8sgate/backend:latest
          ports:
            - containerPort: 8080
          env:
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: k8sgate-db-secret
                  key: host
            - name: DB_PORT
              value: "3306"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: k8sgate-db-secret
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: k8sgate-db-secret
                  key: password
            - name: DB_NAME
              value: "k8sgate"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: k8sgate-jwt-secret
                  key: secret
            - name: DASHBOARD_URL
              value: "https://kubernetes-dashboard.kubernetes-dashboard.svc"
            - name: PASSWORD_MAX_AGE
              value: "90"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: k8sgate-backend
  namespace: k8sgate-system
  labels:
    app: k8sgate-backend
spec:
  selector:
    app: k8sgate-backend
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
