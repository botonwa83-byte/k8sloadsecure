# Dashboard 安全配置
# 用于生产环境的 Dashboard 安全加固

# 1. 修改 Dashboard Service 为 ClusterIP（禁止外部直接访问）
---
apiVersion: v1
kind: Service
metadata:
  name: kubernetes-dashboard
  namespace: kubernetes-dashboard
spec:
  type: ClusterIP
  ports:
  - port: 443
    targetPort: 8443
  selector:
    k8s-app: kubernetes-dashboard

# 2. 网络隔离策略
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: restrict-dashboard
  namespace: kubernetes-dashboard
spec:
  podSelector:
    matchLabels:
      k8s-app: kubernetes-dashboard
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: k8sgate
    ports:
    - protocol: TCP
      port: 8443

# 3. k8sgate ServiceAccount（用于访问 Dashboard）
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8sgate-proxy
  namespace: kubernetes-dashboard

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: k8sgate-proxy
  namespace: kubernetes-dashboard
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: kubernetes-dashboard
subjects:
- kind: ServiceAccount
  name: k8sgate-proxy
  namespace: kubernetes-dashboard