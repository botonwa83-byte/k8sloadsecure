apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8sgate-frontend
  namespace: k8sgate-system
  labels:
    app: k8sgate-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: k8sgate-frontend
  template:
    metadata:
      labels:
        app: k8sgate-frontend
    spec:
      containers:
        - name: frontend
          image: registry.wanfangdata.com.cn/k8sgate/frontend:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi

---
apiVersion: v1
kind: Service
metadata:
  name: k8sgate-frontend
  namespace: k8sgate-system
  labels:
    app: k8sgate-frontend
spec:
  selector:
    app: k8sgate-frontend
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
